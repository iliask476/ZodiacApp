<h3>Πάτα & Ανακάλυψε την Τύχη σου </h3>

    </span> <br>

<div id="calendarResult"></div>

<script>

document.addEventListener("DOMContentLoaded", () => {

const btn = document.getElementById("calendarBtn");
const input = document.getElementById("datePicker");

btn.addEventListener("click", () => {
    if (input.showPicker) {
        input.showPicker();
    } else {
        input.focus();
        input.click();
    }
});

input.addEventListener("change", showZodiac);

function showZodiac() {
  const date = input.value;
  const result = document.getElementById("calendarResult");

  if (!date) {
    result.innerHTML = "Διάλεξε ημερομηνία";
    return;
  }

  const zodiacs = [
    "Κριός ♈", "Ταύρος ♉", "Δίδυμοι ♊", "Καρκίνος ♋",
    "Λέων ♌", "Παρθένος ♍", "Ζυγός ♎", "Σκορπιός ♏",
    "Τοξότης ♐", "Αιγόκερως ♑", "Υδροχόος ♒", "Ιχθύες ♓"
  ];

  const selectedDate = new Date(date);

  const index = selectedDate.getDate() % 12;

  const luckyNumber =
    ((selectedDate.getFullYear() +
      selectedDate.getMonth() +
      1 +
      selectedDate.getDate()) * 7) % 99 + 1;

  const dayValue =
    (selectedDate.getDate() +
     selectedDate.getMonth() +
     1) % 3;

  let dayType = "";

  if (dayValue === 0) dayType = "🟢 Πολύ Τυχερή Μέρα";
  else if (dayValue === 1) dayType = "🟡 Ουδέτερη Μέρα";
  else dayType = "🔴 Δύσκολη Μέρα";

  const luckyColors = ["🔵 Μπλε","🔴 Κόκκινο","🟢 Πράσινο","🟣 Μωβ","🟡 Κίτρινο"];

  const luckyColor =
    luckyColors[selectedDate.getDate() % luckyColors.length];

  result.innerHTML = `
    <h3>Ζώδιο ημέρας: ${zodiacs[index]}</h3>
    <h3>${dayType}</h3>
    <h3>🍀 Lucky Number: <b>${luckyNumber}</b></h3>
    <h3>🎨 Lucky Color: <b>${luckyColor}</b><h3>
  `;
}

});

</script>
